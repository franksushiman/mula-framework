<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Configurações - Ceia OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f9fafb; color: #111827; }
        .input-clean { border: 1px solid #d1d5db; padding: 0.6rem; border-radius: 0.4rem; width: 100%; outline: none; }
        .btn-clean { background: #ea580c; color: white; padding: 0.7rem; border-radius: 0.4rem; font-weight: 600; width: 100%; }
        #toast { visibility: hidden; background: #10b981; color: white; padding: 1rem; position: fixed; top: 20px; right: 20px; border-radius: 0.4rem; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div id="toast">Salvo com sucesso!</div>
    <main class="container mx-auto p-8 max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 bg-white p-6 rounded-xl shadow border border-gray-200">
            <h2 class="text-xl font-bold mb-6">Integrações</h2>
            <form id="config-form" class="space-y-4">
                <input type="password" id="openai-key" value="{{ openai_api_key }}" class="input-clean" placeholder="OpenAI Key">
                <input type="password" id="maps-key" value="{{ maps_api_key }}" class="input-clean" placeholder="Google Maps Key">
                <input type="password" id="asaas-key" value="{{ asaas_key }}" class="input-clean" placeholder="Asaas Key">
                <input type="password" id="telegram-token" value="{{ telegram_store_token }}" class="input-clean" placeholder="Telegram Bot Token">
                <button type="submit" class="btn-clean">Salvar</button>
            </form>
        </div>
        <div class="bg-white p-6 rounded-xl shadow border border-gray-200 text-center">
            <h2 class="text-lg font-bold mb-4">WhatsApp</h2>
            <div id="qr-container" class="bg-gray-50 p-4 border rounded min-h-[200px] flex items-center justify-center">...</div>
            <p id="qr-status" class="mt-2 text-sm text-gray-500">Aguardando...</p>
        </div>
    </main>
    <footer class="text-center py-6 text-xs text-gray-400">
        <a href="http://mula.ia.br/documentacao" target="_blank">Mula FRamework V3</a>
    </footer>
    <script>
        async function checkQR() {
            const res = await fetch('/api/whatsapp/qr');
            const data = await res.json();
            const container = document.getElementById('qr-container');
            if (data.qr) {
                container.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(data.qr)}">`;
                document.getElementById('qr-status').textContent = "Escaneie o QR Code";
            } else {
                container.innerHTML = "<span class='text-4xl'>✅</span>";
                document.getElementById('qr-status').textContent = "Conectado";
            }
        }
        setInterval(checkQR, 3000);
        document.getElementById('config-form').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    openai_api_key: document.getElementById('openai-key').value,
                    maps_key: document.getElementById('maps-key').value,
                    asaas_key: document.getElementById('asaas-key').value,
                    telegram_store_token: document.getElementById('telegram-token').value
                })
            });
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        };
    </script>
</body>
</html>
