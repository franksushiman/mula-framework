<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - Ceia Bistro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800">Nosso Cardápio</h1>
            <p class="text-gray-600 mt-2">Sabores que encantam, momentos que marcam.</p>
        </header>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-6 gap-y-8">
            <!-- Exemplo de como os itens do menu seriam renderizados dinamicamente -->
            {% for item in menu_items %}
            <div class="bg-white rounded-xl shadow-md overflow-hidden transform hover:-translate-y-1 transition-transform duration-300 group">
                <div class="h-40 w-full">
                    <img src="{{ item.image_url or 'https://via.placeholder.com/300' }}" alt="Foto de {{ item.name }}" class="w-full h-full object-cover">
                </div>
                <div class="p-4 flex flex-col">
                    <h2 class="text-lg font-bold text-gray-800 truncate">{{ item.name }}</h2>
                    <p class="text-sm text-gray-500 mt-1 h-10 overflow-hidden">{{ item.description }}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-xl font-bold text-gray-900">R$ {{ "%.2f"|format(item.price) }}</span>
                        <button class="bg-orange-500 text-white font-bold w-10 h-10 rounded-full flex items-center justify-center text-2xl hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-opacity-50 transform group-hover:scale-110 transition-transform">
                            +
                        </button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
