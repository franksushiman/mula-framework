<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - Ceia Bistro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-image {
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800">Nosso Cardápio</h1>
            <p class="text-gray-600 mt-2">Sabores que encantam, momentos que marcam.</p>
        </header>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Exemplo de como os itens do menu seriam renderizados dinamicamente -->
            {% for item in menu_items %}
            <div class="bg-white rounded-lg shadow-lg overflow-hidden transform hover:-translate-y-1 transition-transform duration-300">
                <div class="h-48 w-full">
                    <img src="{{ item.image_url or 'https://via.placeholder.com/300' }}" alt="Foto de {{ item.name }}" class="product-image">
                </div>
                <div class="p-4">
                    <h2 class="text-xl font-semibold text-gray-900 truncate">{{ item.name }}</h2>
                    <p class="text-gray-600 mt-1 h-10 overflow-hidden">{{ item.description }}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-lg font-bold text-gray-900">R$ {{ "%.2f"|format(item.price) }}</span>
                        <button class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-opacity-50">
                            Adicionar
                        </button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
