<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for webkit browsers */
        .kanban-column::-webkit-scrollbar {
            width: 8px;
        }
        .kanban-column::-webkit-scrollbar-track {
            background: #2d3748; /* gray-800 */
        }
        .kanban-column::-webkit-scrollbar-thumb {
            background: #4a5568; /* gray-600 */
            border-radius: 4px;
        }
        .kanban-column::-webkit-scrollbar-thumb:hover {
            background: #718096; /* gray-500 */
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6">Dashboard Operacional</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Coluna A Confirmar -->
            <div class="bg-gray-800 rounded-lg p-4">
                <h2 class="text-xl font-semibold mb-4">A Confirmar</h2>
                <div id="column-confirm" class="kanban-column space-y-4 h-[80vh] overflow-y-auto pr-2">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna Cozinha -->
            <div class="bg-gray-800 rounded-lg p-4">
                <h2 class="text-xl font-semibold mb-4">Cozinha</h2>
                <div id="column-kitchen" class="kanban-column space-y-4 h-[80vh] overflow-y-auto pr-2">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna Pronto/Entrega -->
            <div class="bg-gray-800 rounded-lg p-4">
                <h2 class="text-xl font-semibold mb-4">Pronto / Entrega</h2>
                <div id="column-delivery" class="kanban-column space-y-4 h-[80vh] overflow-y-auto pr-2">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const columns = {
                confirm: document.getElementById('column-confirm'),
                kitchen: document.getElementById('column-kitchen'),
                delivery: document.getElementById('column-delivery'),
            };

            const statusColors = {
                CONFIRMED: 'bg-blue-500',
                PENDING_PAYMENT: 'bg-yellow-500',
                PREPARING: 'bg-orange-500',
                READY_FOR_PICKUP: 'bg-green-500',
                DISPATCHED: 'bg-teal-500',
                DEFAULT: 'bg-gray-500'
            };

            function getStatusColor(status) {
                return statusColors[status] || statusColors.DEFAULT;
            }

            function renderOrderCard(order) {
                const itemsHtml = order.items.map(item => `
                    <li class="text-sm text-gray-300">${item.quantity}x ${item.name}</li>
                `).join('');

                const timeAgo = (date) => {
                    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
                    let interval = seconds / 31536000;
                    if (interval > 1) return Math.floor(interval) + " anos";
                    interval = seconds / 2592000;
                    if (interval > 1) return Math.floor(interval) + " meses";
                    interval = seconds / 86400;
                    if (interval > 1) return Math.floor(interval) + " dias";
                    interval = seconds / 3600;
                    if (interval > 1) return Math.floor(interval) + "h";
                    interval = seconds / 60;
                    if (interval > 1) return Math.floor(interval) + "m";
                    return Math.floor(seconds) + "s";
                }

                return `
                    <div class="bg-gray-700 rounded-lg p-4 shadow-md">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-bold">${order.customer_name}</h3>
                            <span class="text-xs text-gray-400">${timeAgo(order.created_at)}</span>
                        </div>
                        <ul class="list-disc list-inside mb-3">
                            ${itemsHtml}
                        </ul>
                        <div class="flex justify-between items-center">
                            <span class="text-lg font-bold">R$ ${order.total_price.toFixed(2)}</span>
                            <span class="text-xs font-semibold px-2 py-1 rounded-full ${getStatusColor(order.status)}">
                                ${order.status}
                            </span>
                        </div>
                    </div>
                `;
            }

            async function fetchAndRenderOrders() {
                try {
                    const response = await fetch('/api/orders');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const orders = await response.json();

                    // Limpar colunas antes de renderizar
                    Object.values(columns).forEach(col => col.innerHTML = '');

                    orders.forEach(order => {
                        const cardHtml = renderOrderCard(order);
                        switch (order.status) {
                            case 'PENDING_PAYMENT':
                            case 'CONFIRMED':
                                columns.confirm.innerHTML += cardHtml;
                                break;
                            case 'PREPARING':
                                columns.kitchen.innerHTML += cardHtml;
                                break;
                            case 'READY_FOR_PICKUP':
                            case 'DISPATCHED':
                                columns.delivery.innerHTML += cardHtml;
                                break;
                            // Pedidos DRAFT, DELIVERED, CANCELLED não aparecem no Kanban
                        }
                    });

                } catch (error) {
                    console.error("Falha ao buscar pedidos:", error);
                    columns.confirm.innerHTML = '<p class="text-red-400">Erro ao carregar pedidos.</p>';
                }
            }

            // Carregar inicialmente e depois a cada 10 segundos
            fetchAndRenderOrders();
            setInterval(fetchAndRenderOrders, 10000);
        });
    </script>
</body>
</html>
