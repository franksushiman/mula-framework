<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operacional - Ceia Bistro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a202c; /* gray-900 */
        }
        .kanban-column::-webkit-scrollbar {
            width: 8px;
        }
        .kanban-column::-webkit-scrollbar-track {
            background: #2d3748; /* gray-800 */
        }
        .kanban-column::-webkit-scrollbar-thumb {
            background: #4a5568; /* gray-600 */
            border-radius: 4px;
        }
        .kanban-column::-webkit-scrollbar-thumb:hover {
            background: #718096; /* gray-500 */
        }
    </style>
</head>
<body class="text-white font-sans">
    <div class="container mx-auto p-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-200">Painel de Pedidos</h1>
            <a href="/admin" class="text-sm bg-gray-700 hover:bg-gray-600 text-gray-300 font-semibold py-2 px-4 rounded-lg transition-colors duration-200">
                Gerenciar Cardápio
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Coluna A Fazer -->
            <div class="bg-gray-800 rounded-lg shadow-lg p-4">
                <h2 class="text-xl font-semibold mb-4 border-b-2 border-blue-500 pb-2">A Fazer</h2>
                <div id="column-new" class="kanban-column space-y-4 h-[80vh] overflow-y-auto pr-2">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna Preparando -->
            <div class="bg-gray-800 rounded-lg shadow-lg p-4">
                <h2 class="text-xl font-semibold mb-4 border-b-2 border-orange-500 pb-2">Preparando</h2>
                <div id="column-preparing" class="kanban-column space-y-4 h-[80vh] overflow-y-auto pr-2">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna Pronto -->
            <div class="bg-gray-800 rounded-lg shadow-lg p-4">
                <h2 class="text-xl font-semibold mb-4 border-b-2 border-green-500 pb-2">Pronto</h2>
                <div id="column-ready" class="kanban-column space-y-4 h-[80vh] overflow-y-auto pr-2">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const columns = {
                new: document.getElementById('column-new'),
                preparing: document.getElementById('column-preparing'),
                ready: document.getElementById('column-ready'),
            };

            const statusStyles = {
                CONFIRMED: { text: 'Confirmado', color: 'bg-blue-600' },
                PREPARING: { text: 'Preparando', color: 'bg-orange-600' },
                READY_FOR_PICKUP: { text: 'Pronto', color: 'bg-green-600' },
                DEFAULT: { text: 'Indefinido', color: 'bg-gray-600' }
            };

            function getStatusStyle(status) {
                return statusStyles[status] || statusStyles.DEFAULT;
            }

            function renderOrderCard(order) {
                const style = getStatusStyle(order.status);
                const itemsHtml = order.items.map(item => `
                    <div class="pt-2 mt-2 border-t border-gray-600 first:mt-0 first:pt-0 first:border-t-0">
                        <p class="text-gray-300">${item.quantity}x ${item.name}</p>
                        ${item.obs ? `<p class="text-sm text-yellow-400 pl-2"><strong class="font-semibold">Obs:</strong> ${item.obs}</p>` : ''}
                    </div>
                `).join('');

                return `
                    <div onclick="advanceOrder('${order.id}')" class="cursor-pointer bg-gray-700 rounded-lg p-4 shadow-md border-l-4 border-${style.color.split('-')[1]}-500 transform hover:scale-105 transition-transform duration-200">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg text-gray-100">${order.customer}</h3>
                            <span class="text-sm font-mono text-gray-400">#${order.id}</span>
                        </div>
                        
                        ${itemsHtml}

                        <div class="text-right mt-4">
                            <span class="text-xs font-semibold px-3 py-1 rounded-full ${style.color} text-white">
                                ${style.text}
                            </span>
                        </div>
                    </div>
                `;
            }

            async function advanceOrder(orderId) {
                try {
                    const response = await fetch(`/api/orders/${orderId}/advance`, {
                        method: 'PATCH',
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    // Recarrega o board para feedback visual imediato
                    await fetchAndRenderOrders();
                } catch (error) {
                    console.error(`Falha ao avançar o pedido ${orderId}:`, error);
                }
            }

            async function fetchAndRenderOrders() {
                try {
                    const response = await fetch('/api/orders');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const orders = await response.json();

                    // Limpar colunas antes de renderizar
                    Object.values(columns).forEach(col => col.innerHTML = '');

                    orders.forEach(order => {
                        const cardHtml = renderOrderCard(order);
                        switch (order.status) {
                            case 'CONFIRMED':
                                columns.new.innerHTML += cardHtml;
                                break;
                            case 'PREPARING':
                                columns.preparing.innerHTML += cardHtml;
                                break;
                            case 'READY_FOR_PICKUP':
                                columns.ready.innerHTML += cardHtml;
                                break;
                        }
                    });

                } catch (error) {
                    console.error("Falha ao buscar pedidos:", error);
                    columns.new.innerHTML = '<p class="text-red-400">Erro ao carregar pedidos.</p>';
                }
            }

            // Carregar inicialmente e depois a cada 5 segundos
            fetchAndRenderOrders();
            setInterval(fetchAndRenderOrders, 5000);
        });
    </script>
</body>
</html>
