<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozinha (KDS) - Ceia Bistro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .kanban-column::-webkit-scrollbar { width: 8px; }
        .kanban-column::-webkit-scrollbar-track { background: #1f2937; } /* gray-800 */
        .kanban-column::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; } /* gray-600 */
        .kanban-column::-webkit-scrollbar-thumb:hover { background: #6b7280; } /* gray-500 */
    </style>
</head>
<body class="bg-gray-900 text-gray-300 font-sans">
    <header class="bg-gray-800/80 backdrop-blur-sm sticky top-0 z-10">
        <nav class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">Cozinha (KDS)</h1>
            <div class="flex items-center space-x-4 text-sm font-medium">
                <a href="/dashboard" class="text-white ring-1 ring-white/50 bg-gray-700/50 px-3 py-1 rounded-md">Cozinha</a>
                <a href="/admin" class="text-gray-400 hover:text-white transition-colors">Admin</a>
                <a href="/cardapio" target="_blank" class="text-gray-400 hover:text-white transition-colors">Ver Cardápio</a>
            </div>
        </nav>
    </header>
    <div class="container mx-auto p-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Coluna A Fazer -->
            <div class="bg-gray-800/50 rounded-xl">
                <h2 class="text-lg font-bold text-white mb-4 p-4 border-b-2 border-sky-500/50">A Fazer</h2>
                <div id="column-new" class="kanban-column space-y-4 h-[calc(100vh-150px)] overflow-y-auto p-4 pt-0">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna Preparando -->
            <div class="bg-gray-800/50 rounded-xl">
                <h2 class="text-lg font-bold text-white mb-4 p-4 border-b-2 border-orange-500/50">Preparando</h2>
                <div id="column-preparing" class="kanban-column space-y-4 h-[calc(100vh-150px)] overflow-y-auto p-4 pt-0">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna Pronto -->
            <div class="bg-gray-800/50 rounded-xl">
                <h2 class="text-lg font-bold text-white mb-4 p-4 border-b-2 border-green-500/50">Pronto</h2>
                <div id="column-ready" class="kanban-column space-y-4 h-[80vh] overflow-y-auto pr-2">
                    <!-- Cards de pedidos serão inseridos aqui -->
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const columns = {
                new: document.getElementById('column-new'),
                preparing: document.getElementById('column-preparing'),
                ready: document.getElementById('column-ready'),
            };

            const statusStyles = {
                CONFIRMED: { text: 'Confirmado', color: 'bg-sky-500', border: 'border-sky-500' },
                PREPARING: { text: 'Preparando', color: 'bg-orange-500', border: 'border-orange-500' },
                READY_FOR_PICKUP: { text: 'Pronto', color: 'bg-green-500', border: 'border-green-500' },
                DEFAULT: { text: 'Indefinido', color: 'bg-gray-500', border: 'border-gray-500' }
            };

            function getStatusStyle(status) {
                return statusStyles[status] || statusStyles.DEFAULT;
            }

            function renderOrderCard(order) {
                const style = getStatusStyle(order.status);
                const itemsHtml = order.items.map(item => `
                    <div class="pt-2 mt-2 border-t border-gray-700/50 first:mt-0 first:pt-0 first:border-t-0">
                        <p class="font-medium text-gray-200">${item.quantity}x ${item.name}</p>
                        ${item.obs ? `<p class="text-sm text-yellow-400 pl-2"><strong class="font-semibold">Obs:</strong> ${item.obs}</p>` : ''}
                    </div>
                `).join('');

                return `
                    <div onclick="advanceOrder('${order.id}')" class="cursor-pointer bg-gray-800 rounded-xl p-4 shadow-lg border-l-4 ${style.border} transform hover:scale-[1.02] hover:shadow-xl transition-all duration-200">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-lg text-white">${order.customer}</h3>
                            <span class="text-sm font-mono text-gray-400">#${order.id} &bull; ${order.created_at_brt}</span>
                        </div>
                        
                        <div class="space-y-1">${itemsHtml}</div>

                        <div class="text-right mt-4">
                            <span class="text-xs font-bold px-3 py-1 rounded-full ${style.color} text-white uppercase tracking-wider">
                                ${style.text}
                            </span>
                        </div>
                    </div>
                `;
            }

            async function advanceOrder(orderId) {
                try {
                    const response = await fetch(`/api/orders/${orderId}/advance`, {
                        method: 'PATCH',
                    });
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    // Recarrega o board para feedback visual imediato
                    await fetchAndRenderOrders();
                } catch (error) {
                    console.error(`Falha ao avançar o pedido ${orderId}:`, error);
                }
            }
            window.advanceOrder = advanceOrder;

            async function fetchAndRenderOrders() {
                try {
                    const response = await fetch('/api/orders');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const orders = await response.json();

                    // Limpar colunas antes de renderizar
                    Object.values(columns).forEach(col => col.innerHTML = '');

                    orders.forEach(order => {
                        const cardHtml = renderOrderCard(order);
                        switch (order.status) {
                            case 'CONFIRMED':
                                columns.new.innerHTML += cardHtml;
                                break;
                            case 'PREPARING':
                                columns.preparing.innerHTML += cardHtml;
                                break;
                            case 'READY_FOR_PICKUP':
                                columns.ready.innerHTML += cardHtml;
                                break;
                        }
                    });

                } catch (error) {
                    console.error("Falha ao buscar pedidos:", error);
                    columns.new.innerHTML = '<p class="text-red-400">Erro ao carregar pedidos.</p>';
                }
            }

            // Carregar inicialmente e depois a cada 5 segundos
            fetchAndRenderOrders();
            setInterval(fetchAndRenderOrders, 5000);
        });
    </script>
</body>
</html>
