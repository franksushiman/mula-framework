<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceia V2 - Dashboard</title>
    <style>
       body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
       h1 { color: #333; margin-bottom: 20px; }
       .stats-container { display: flex; gap: 20px; margin-bottom: 20px; }
       .card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
       .card h3 { margin: 0 0 10px; color: #666; font-size: 1.1em; }
       .big-number { font-size: 2.5em; font-weight: bold; color: #2c3e50; margin: 0; }
       .online { color: #27ae60; } /* Verde para online */
       #fleet-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
       table { width: 100%; border-collapse: collapse; }
       th { text-align: left; color: #666; padding-bottom: 10px; border-bottom: 2px solid #eee; }
       td { padding: 10px 0; border-bottom: 1px solid #eee; }
     </style>
</head>
<body>
    <div class='stats-container'>
       <div class='card'><h3>Online Agora</h3><p id='online-count' class='big-number'>0</p></div>
       <div class='card'><h3>Entregas Hoje</h3><p id='delivery-count' class='big-number'>0</p></div>
     </div>
    <div id="fleet-container">Carregando...</div>
    <script src="./renderer.js"></script>
</body>
</html>
