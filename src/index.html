<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceia V2 - Dashboard</title>
    <style>
       @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
       
       * {
           box-sizing: border-box;
       }

       body { 
           font-family: 'Inter', 'Segoe UI', sans-serif; 
           background: #0a0a0a; 
           color: #ffffff;
           margin: 0; 
           display: flex;
           flex-direction: column;
           height: 100vh;
           overflow: hidden; /* Evita scroll no body */
       }

       .main-content {
           flex: 1;
           display: flex;
           flex-direction: column;
           overflow: hidden;
           padding-bottom: 60px; /* Espaço para o footer */
       }

       .stats-container { 
           display: flex; 
           gap: 40px; 
           padding: 40px 40px 20px 40px;
       }

       .card { 
           background: transparent; 
           text-align: center; 
           flex: 1; 
       }

       .card h3 { 
           margin: 0 0 10px; 
           color: #888; 
           font-size: 1em; 
           font-weight: 400;
           text-transform: uppercase;
           letter-spacing: 0.5px;
       }

       .big-number { 
           font-size: 4em; 
           font-weight: 700; 
           color: #fff; 
           margin: 0; 
           line-height: 1;
           transition: color 0.3s ease-in-out;
       }

       .online { color: #27ae60; }

       #fleet-container { 
           flex: 1;
           overflow-y: auto;
           padding: 0 40px;
       }

       #fleet-container p {
           text-align: center;
           color: #555;
           margin-top: 50px;
       }

       table { 
           width: 100%; 
           border-collapse: collapse; 
       }

       th, td { 
           padding: 16px 0; 
           border-bottom: 1px solid #333; 
           text-align: left; 
           transition: background-color 0.3s ease-in-out;
       }

       tr:last-child td {
           border-bottom: none;
       }

       th { 
           color: #888; 
           font-weight: 400;
           font-size: 0.9em;
           text-transform: uppercase;
       }

       td {
           color: #eee;
       }

       footer {
           position: fixed;
           bottom: 0;
           left: 0;
           right: 0;
           background: rgba(0,0,0,0.8);
           backdrop-filter: blur(10px);
           -webkit-backdrop-filter: blur(10px);
           padding: 15px 25px;
           display: flex;
           justify-content: space-between;
           align-items: center;
           border-top: 1px solid #333;
           height: 60px;
       }

       .status-indicator {
           width: 10px;
           height: 10px;
           background: #27ae60; /* Verde para online */
           border-radius: 50%;
           box-shadow: 0 0 8px #27ae60;
       }

       footer a {
           color: #555;
           text-decoration: none;
           font-size: 0.8em;
           transition: color 0.3s ease-in-out;
       }

       footer a:hover {
           color: #fff;
       }
     </style>
</head>
<body>
    <div class="main-content">
        <div class='stats-container'>
            <div class='card'><h3>Online Agora</h3><p id='online-count' class='big-number'>0</p></div>
            <div class='card'><h3>Entregas Hoje</h3><p id='delivery-count' class='big-number'>0</p></div>
        </div>
        <div id="fleet-container">Carregando...</div>
    </div>

    <footer>
        <div class="status-indicator"></div>
        <a href="https://mula.ia.br/documentacao" target="_blank">Mula Framework V3</a>
    </footer>

    <script src="./renderer.js"></script>
</body>
</html>
